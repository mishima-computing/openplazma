name: Repository Hygiene

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  public-repo-hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check tracked files
        run: python scripts/check-public-repo-hygiene.py
