name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Install JavaScript dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Typecheck
        run: corepack pnpm typecheck

      - name: Test
        run: corepack pnpm test

      - name: Install JupyterLite
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r apps/workbench-lite/requirements.txt

      - name: Prepare Workbench Lite files
        run: python scripts/prepare-workbench-lite.py

      - name: Build Pages site
        run: python scripts/build-pages-site.py

      - name: Check public repository hygiene
        run: python scripts/check-public-repo-hygiene.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist/pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
