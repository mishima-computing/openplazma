name: JupyterLite CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install JupyterLite
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r apps/workbench-lite/requirements.txt

      - name: Prepare Workbench Lite files
        run: python scripts/prepare-workbench-lite.py

      - name: Build JupyterLite site
        run: jupyter lite build --lite-dir apps/workbench-lite --output-dir apps/workbench-lite/_output

      - name: Check JupyterLite site
        run: jupyter lite check --lite-dir apps/workbench-lite --output-dir apps/workbench-lite/_output
