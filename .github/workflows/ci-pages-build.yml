name: Pages Build CI

on:
  pull_request:
    branches:
      - main

jobs:
  build-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Enable Corepack
        run: corepack enable

      - name: Install JavaScript dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Install JupyterLite
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r apps/workbench-lite/requirements.txt

      - name: Build Pages site
        run: python scripts/build-pages-site.py

      - name: Confirm Pages output exists
        run: test -f dist/pages/index.html && test -f dist/pages/workbench/lab/index.html

      - name: Check public repository hygiene
        run: python scripts/check-public-repo-hygiene.py
