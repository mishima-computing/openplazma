name: Bug report
description: Report a reproducible problem in the OpenPlazma Lab, Workbench, or docs.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. OpenPlazma currently uses STATIC_FIXTURE data only and is not a validated fusion simulator or hardware control system.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the smallest steps that reproduce the problem.
      placeholder: |
        1. Open ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: URL or path
      description: Public demo URL, local URL, or repository path where the issue appears.
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, local command, or commit if relevant.
  - type: textarea
    id: logs
    attributes:
      label: Console output or logs
      description: Paste relevant errors. Do not include secrets, tokens, keys, or credentials.
      render: text
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This report does not include secrets, credentials, or private data.
          required: true
        - label: This report does not include real hardware instructions or hazardous experiment procedures.
          required: true
